services:
  - type: web
    name: finae-api
    runtime: node
    rootDir: artifacts/api-server
    buildCommand: npm install -g pnpm@9 && pnpm install && pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production

  - type: static
    name: finae-store
    rootDir: artifacts/store
    buildCommand: npm install -g pnpm@9 && pnpm install && pnpm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://finae-api.onrender.com
