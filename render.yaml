services:
  - type: web
    name: finae-api
    env: node
    plan: free
    buildCommand: npm install -g pnpm@9 --prefix=/tmp/pnpm && export PATH=/tmp/pnpm/bin:$PATH && pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
